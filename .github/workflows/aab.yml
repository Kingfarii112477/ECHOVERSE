name: Build AAB (Play Store)

on:
  push:
    tags:
      - 'release-*'

jobs:
  build-aab:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Remove API routes for static export
        run: |
          rm -rf app/api app/auth

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode signing key
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/echoverse-release.keystore

      - name: Build AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
        env:
          ECHOVERSE_RELEASE_STORE_FILE: echoverse-release.keystore
          ECHOVERSE_RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ECHOVERSE_RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ECHOVERSE_RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: echoverse-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab